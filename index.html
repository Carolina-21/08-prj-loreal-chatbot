<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>L'Oréal Beauty Assistant</title>

  <link rel="stylesheet" href="style.css">
</head>


<body>

  <div class="chat-container">


    <!-- =========================
         HEADER
    ========================== -->

    <header>

      <img
        src="images/loreal-logo.png"
        class="logo"
        alt="L'Oréal Logo"
      >

      <h1>L'Oréal Beauty Assistant</h1>

      <p>Your AI beauty expert</p>

    </header>


    <!-- =========================
         LATEST USER QUESTION
    ========================== -->

    <div id="latestQuestion">
      Ask me a beauty question!
    </div>


    <!-- =========================
         CHAT CONVERSATION
    ========================== -->

    <div id="chatBox">

      <!-- Initial chatbot welcome message -->
      <div class="message bot">
        Hi! I'm your L'Oréal Beauty Assistant. ✨
        Ask me about skincare, makeup, haircare,
        fragrances, or personalized beauty routines.
      </div>

    </div>


    <!-- =========================
         USER INPUT
    ========================== -->

    <div class="input-area">

      <input
        id="userInput"
        type="text"
        placeholder="Ask about skincare, makeup, haircare..."
        autocomplete="off"
        aria-label="Ask the L'Oréal Beauty Assistant a question"
      >

      <button
        id="sendBtn"
        type="button"
      >
        Send
      </button>

    </div>


    <!-- =========================
         FOOTER
    ========================== -->

    <footer>
      Made with AI • L'Oréal Beauty Assistant
    </footer>


  </div>


  <!-- JavaScript -->
  <script src="script.js"></script>


</body>

</html>
